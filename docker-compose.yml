services:
  backend:
    build:
      context: ./backend
    environment:
      SNAKE_DB_PATH: /data/snake_scores.db
      ALLOWED_ORIGIN: "*"
    volumes:
      - snake-data:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  snake-data:
